services:
  chroma:
    platform: linux/amd64
    image: open-notebooklm-chroma:amd64
    ports:
      - "8001:8000"
    volumes:
      - ${DATA_PATH:-./data}/index:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE

  backend:
    platform: linux/amd64
    image: open-notebooklm-backend:amd64
    ports:
      - "8080:8080"
    volumes:
      - ${DATA_PATH:-./data}:/data
    environment:
      - LMSTUDIO_BASE_URL=${LMSTUDIO_BASE_URL:-http://host.docker.internal:1234/v1}
      - LMSTUDIO_MODEL=${LMSTUDIO_MODEL:-local-model}
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - DATA_DIR=/data
      - PIPER_BINARY=piper
      - PIPER_VOICES_DIR=/opt/piper-voices
      - SILERO_MODELS_DIR=/opt/silero-models
      - MUSIC_ASSETS_DIR=/opt/audio-assets
      - CONFIG_YAML=/data/config.yaml
      - OPENBLAS_NUM_THREADS=1
      - OMP_NUM_THREADS=1
      - MKL_NUM_THREADS=1
      - NUMEXPR_NUM_THREADS=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - chroma

  frontend:
    platform: linux/amd64
    image: open-notebooklm-frontend:amd64
    ports:
      - "3000:3000"
    depends_on:
      - backend
